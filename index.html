<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML CSS and JS</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>">
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Pomodoro & Controls -->
        <aside class="sidebar glass-panel">
            <h1 class="logo"><i class="fa-solid fa-code"></i> HTML CSS and JS</h1>
            
            <div class="pomodoro-container">
                <h2>Pomodoro</h2>
                <div class="timer-display" id="timer-display">25:00</div>
                <div class="timer-status" id="timer-status">Ready to Focus</div>
                
                <div class="timer-controls">
                    <button id="btn-start" class="btn primary"><i class="fa-solid fa-play"></i> Start</button>
                    <button id="btn-pause" class="btn secondary" disabled><i class="fa-solid fa-pause"></i> Pause</button>
                    <button id="btn-reset" class="btn secondary"><i class="fa-solid fa-rotate-right"></i> Reset</button>
                </div>

                <div class="timer-settings">
                    <div class="setting-group">
                        <label>Focus (min)</label>
                        <input type="number" id="focus-time" value="25" min="1" max="120">
                    </div>
                    <div class="setting-group">
                        <label>Break (min)</label>
                        <input type="number" id="break-time" value="5" min="1" max="60">
                    </div>
                </div>
            </div>

        </aside>

        <!-- Main Content: Calendar -->
        <main class="main-content glass-panel">
            <div class="calendar-header">
                <button id="prev-month" class="icon-btn"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 id="current-month-year">Month Year</h2>
                <button id="next-month" class="icon-btn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            
            <div class="calendar-grid">
                <div class="weekdays">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>
                
                <!-- Days will be dynamically injected here -->
                <div id="calendar-days" class="calendar-days"></div>
            </div>
        </main>
    </div>

    <!-- Daily Planner Modal -->
    <div class="modal-overlay" id="daily-modal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <div class="modal-title-group">
                    <h2 id="modal-date-title">Date</h2>
                    <div class="productivity-counter" title="Focus Sessions completed (Auto-increments after Focus time)">
                        <button id="prod-minus" class="icon-btn-small" title="Decrease score"><i class="fa-solid fa-minus"></i></button>
                        <span id="prod-score" class="score-display">0</span> <i class="fa-solid fa-stopwatch fire-icon"></i>
                        <button id="prod-plus" class="icon-btn-small" title="Increase score"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <button id="close-modal" class="icon-btn" title="Close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <!-- Daily Stats Analysis Panel -->
            <div class="modal-stats-panel">
                <div class="stat-card">
                    <span class="stat-label">Tasks Done</span>
                    <span id="stat-tasks-done" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Tasks To Do</span>
                    <span id="stat-tasks-todo" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Focus Sessions</span>
                    <span id="stat-focus-sessions" class="stat-value">0</span>
                </div>
            </div>

            <!-- To-Do Input & List -->
            <div class="todo-section">
                <div class="todo-input-wrapper">
                    <input type="text" id="todo-input" placeholder="Add a task for today..." autocomplete="off">
                    <button id="btn-add-todo" class="btn primary"><i class="fa-solid fa-plus"></i> Add</button>
                </div>
                <div class="todo-list-container">
                    <ul id="todo-list" class="todo-list">
                        <!-- Dynamic items -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Authentication Overlay Removed -->
    <script src="app.js?v=1.1"></script>
</body>
</html>
